replicaCount: 1

image:
  repository: gcr.io/YOUR_PROJECT_ID/combat-sports-ai-service
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: false  # AI service is internal-only; accessed via API gateway

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 60

env:
  PYTHONUNBUFFERED: "1"
  UVICORN_WORKERS: "2"

envFromSecrets:
  - name: combat-sports-secrets
    keys:
      - DATABASE_URL
      - REDIS_URL
      - RABBITMQ_URL
      - LITELLM_OPENAI_KEY
      - LITELLM_ANTHROPIC_KEY
      - LITELLM_GEMINI_KEY
      - LITELLM_MASTER_KEY

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 10
