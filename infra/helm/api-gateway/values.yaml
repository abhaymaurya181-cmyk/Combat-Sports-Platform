replicaCount: 2

image:
  repository: gcr.io/YOUR_PROJECT_ID/combat-sports-api-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 4000
  targetPort: 4000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: api.combatsports.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: combat-sports-api-tls
      hosts:
        - api.combatsports.io

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 400m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

env:
  NODE_ENV: production
  PORT: "4000"
  NEXT_PUBLIC_APP_URL: "https://combatsports.io"
  AI_SERVICE_URL: "http://combat-sports-ai-service:8000"

envFromSecrets:
  - name: combat-sports-secrets
    keys:
      - DATABASE_URL
      - REDIS_URL
      - RABBITMQ_URL
      - CLERK_SECRET_KEY

livenessProbe:
  httpGet:
    path: /health
    port: 4000
  initialDelaySeconds: 20
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 4000
  initialDelaySeconds: 10
  periodSeconds: 5
