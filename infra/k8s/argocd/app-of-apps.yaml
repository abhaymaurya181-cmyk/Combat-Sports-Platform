apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: combat-sports-root
  namespace: argocd
  labels:
    app.kubernetes.io/name: combat-sports-root
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/combat-sports-intelligence.git
    targetRevision: HEAD
    path: infra/helm
    directory:
      recurse: true
      jsonnet: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: combat-sports
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
