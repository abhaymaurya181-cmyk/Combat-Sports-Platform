name: Docker Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (default: git SHA)"
        required: false
        default: ""

env:
  REGISTRY: gcr.io
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  build-and-push:
    name: Build & push ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write   # for Workload Identity Federation

    strategy:
      matrix:
        include:
          - app: web
            context: .
            dockerfile: apps/web/Dockerfile
            image: combat-sports-web
          - app: api-gateway
            context: .
            dockerfile: apps/api-gateway/Dockerfile
            image: combat-sports-api-gateway
          - app: ai-service
            context: apps/ai-service
            dockerfile: apps/ai-service/Dockerfile
            image: combat-sports-ai-service
          - app: realtime-service
            context: .
            dockerfile: apps/realtime-service/Dockerfile
            image: combat-sports-realtime-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ matrix.image }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            NODE_ENV=production

  # ─── Update Helm values with new image tags (GitOps) ─────────────────────
  update-helm-values:
    name: Update Helm image tags
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in Helm values
        run: |
          TAG="${{ github.sha }}"
          sed -i "s/tag: .*/tag: \"$TAG\"/" infra/helm/web/values.yaml
          sed -i "s/tag: .*/tag: \"$TAG\"/" infra/helm/api-gateway/values.yaml
          sed -i "s/tag: .*/tag: \"$TAG\"/" infra/helm/ai-service/values.yaml

      - name: Commit updated Helm values
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/*/values.yaml
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]"
          git push
